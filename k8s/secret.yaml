apiVersion: v1
kind: Secret
metadata:
  name: calorie-secrets
  namespace: calorie-tracker
type: Opaque
stringData:
  # Seed list of all three replica set members plus replicaSet=rs0 -- the
  # driver discovers the current PRIMARY from this list and re-routes
  # automatically if a failover happens, so this string never needs to
  # change when membership/roles shift.
  mongodb-uri: "mongodb://mongo-0.mongo-service:27017,mongo-1.mongo-service:27017,mongo-2.mongo-service:27017/calorie_tracker?replicaSet=rs0"
  jwt-secret: "your-super-secret-jwt-key-change-in-production"
