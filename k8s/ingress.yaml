apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: calorie-ingress
  namespace: calorie-tracker
  annotations:
    # nginx.ingress.kubernetes.io/rewrite-target: /
    # For production, add cert-manager annotations:
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  rules:
    - host: calorie-tracker.local  # Replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
  # tls:
  #   - hosts:
  #       - calorie-tracker.local
  #     secretName: calorie-tls
