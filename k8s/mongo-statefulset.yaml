# MongoDB replica set on Kubernetes
# ----------------------------------
# A StatefulSet (not a Deployment) is what gives each Mongo node a stable
# network identity (mongo-0, mongo-1, mongo-2) and its own PersistentVolumeClaim
# that survives pod restarts/rescheduling -- both are required for a replica
# set, since members are identified by hostname and each one owns its own
# copy of the data (the oplog-replicated copy, not a shared volume).
#
# The headless Service (clusterIP: None) is what gives each pod a stable
# DNS name of the form <pod-name>.<service-name>.<namespace>.svc.cluster.local,
# which is exactly what's registered as each replica set member's host.
apiVersion: v1
kind: Service
metadata:
  name: mongo-service
  namespace: calorie-tracker
  labels:
    app: mongo
spec:
  clusterIP: None  # Headless service backing the StatefulSet
  selector:
    app: mongo
  ports:
    - port: 27017
      targetPort: 27017
      name: mongo
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: calorie-tracker
spec:
  serviceName: mongo-service
  replicas: 3
  selector:
    matchLabels:
      app: mongo
  # Mongo nodes should come up one at a time so the replica set can be
  # initiated against a known-good primary before secondaries join.
  podManagementPolicy: OrderedReady
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:7
          command:
            - mongod
            - "--replSet"
            - rs0
            - "--bind_ip_all"
          ports:
            - containerPort: 27017
              name: mongo
          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: mongo-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
# One-shot Job that calls rs.initiate() the first time the cluster comes up.
# It targets mongo-0 directly by its stable StatefulSet DNS name and lists
# all three pods as replica set members. Idempotent: the embedded JS checks
# rs.status() first and only calls rs.initiate() if the replica set doesn't
# exist yet, so re-applying this Job against an already-initialized cluster
# is a safe no-op.
apiVersion: batch/v1
kind: Job
metadata:
  name: mongo-replica-init
  namespace: calorie-tracker
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mongo-replica-init
          image: mongo:7
          command:
            - bash
            - -c
            - |
              set -e
              echo "Waiting for all MongoDB pods to be ready..."
              sleep 10

              for i in 0 1 2; do
                until mongosh --host mongo-$i.mongo-service:27017 --eval "db.adminCommand('ping')" &>/dev/null; do
                  echo "Waiting for mongo-$i..."
                  sleep 3
                done
                echo "mongo-$i is ready"
              done

              echo "Checking if replica set already initialized..."
              STATUS=$(mongosh --host mongo-0.mongo-service:27017 --eval "rs.status().ok" --quiet 2>/dev/null || echo "0")

              if [ "$STATUS" = "1" ]; then
                echo "Replica set already initialized, skipping..."
                exit 0
              else
                echo "Initializing replica set..."
                mongosh --host mongo-0.mongo-service:27017 --eval "
                  rs.initiate({
                    _id: 'rs0',
                    members: [
                      { _id: 0, host: 'mongo-0.mongo-service:27017', priority: 2 },
                      { _id: 1, host: 'mongo-1.mongo-service:27017', priority: 1 },
                      { _id: 2, host: 'mongo-2.mongo-service:27017', priority: 1 }
                    ]
                  })
                "
                echo "Replica set initiated!"
              fi