name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  IMAGE_NAME: calorie-tracker

jobs:
  # Job 1: Lint and Test
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run backend tests
        run: |
          cd backend
          pytest tests/ -v

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend tests
        run: |
          cd frontend
          npm run test

      - name: Build frontend (type-check + bundle)
        run: |
          cd frontend
          npm run build

  # Job 2: Build and Push Docker Images
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=ref,event=branch

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}-backend:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}-frontend:${{ steps.meta.outputs.version }}
          build-args: VITE_API_URL=/api 
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update image tags in k8s manifests
        run: |
          sed -i "s|arsandrej27/calorie-tracker-backend:main|${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}-backend:${{ steps.meta.outputs.version }}|g" k8s/backend-deployment.yaml
          sed -i "s|arsandrej27/calorie-tracker-frontend:main|${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}-frontend:${{ steps.meta.outputs.version }}|g" k8s/frontend-deployment.yaml
      
      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/
          git diff --staged --quiet || git commit -m "Update image tags [skip ci]"
          git push

  # Job 3: Deploy to Kubernetes (CD)
  deploy:
    needs: build-and-push
    runs-on: self-hosted
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/configmap.yaml

          # Mongo StatefulSet first, and wait for all 3 pods to be Ready
          # before touching the replica set or the backend -- the backend
          # would just crash-loop on its readiness probe otherwise.
          kubectl apply -f k8s/mongo-statefulset.yaml
          kubectl rollout status statefulset/mongo -n calorie-tracker --timeout=180s

          # Jobs are immutable once created, so re-running this pipeline
          # against a cluster that already has a replica set means
          # deleting the previous Job object first. The script inside the
          # Job is itself idempotent (rs.initiate() is a no-op if the
          # replica set already exists), so this is safe to repeat.
          kubectl delete job mongo-replica-init -n calorie-tracker --ignore-not-found
          kubectl apply -f k8s/mongo-statefulset.yaml
          kubectl wait --for=condition=complete job/mongo-replica-init -n calorie-tracker --timeout=120s

          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/frontend-nginx-config.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/frontend-service.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/backend -n calorie-tracker --timeout=120s
          kubectl rollout status deployment/frontend -n calorie-tracker --timeout=120s
          kubectl get pods -n calorie-tracker
